# =============================================================================
# valuation_model.yaml — 估值模型（铁则层）
# 来源：《花茶个人投资体系 v4.1》§2.2估值买入标准 / §2.4门槛条件 / §3.1-3.2卖出触发 / 附录A估值锚
# 重要说明：源文档未定义分行业的DCF/目标估值参数体系（如各行业合理PE区间、
#           安全边际折扣率）。个股的"估值锚"由研究笔记逐票定义（附录A）。
#           本文件只结构化源文档实际存在的估值规则，绝不编造参数。
# =============================================================================

meta:
  version: "4.1.0"
  source_document: "花茶个人投资体系v4.1.md"
  structured_date: "2026-07-06"

# -----------------------------------------------------------------------------
# 通用估值原则
# -----------------------------------------------------------------------------
general_principles:
  percentile_window_default: "近10年"   # 【待确认】见 stock_selection.yaml pending_confirmation[1]
  principles:
    - "安全边际优先：估值标准是买入的前置门槛，不满足估值标准不买（§2.2/§2.4）"
    - "相对估值为主：体系采用PE/PB历史分位+股息率锚，而非绝对估值模型"
    - "周期股优先看PB（§2.2）"
    - "个股估值锚（合理PE/PB区间、目标买入价区间）由备选池研究笔记逐票定义（附录A），程序读取研究笔记，无笔记则标注缺失"

# -----------------------------------------------------------------------------
# 股息组合估值规则（来源：§2.2 / §3.1）
# -----------------------------------------------------------------------------
dividend_portfolio:
  buy_criteria:   # 满足≥1条即达到估值买入标准
    threshold: 1
    items:
      - id: pe
        rule: "PE ≤ 行业均值 且 PE处于自身历史30%分位以下"
        params: {industry_pe_op: "<=", self_percentile_max: 0.30}
      - id: pb
        rule: "PB ≤ 2.5 且 PB处于自身历史30%分位以下"
        params: {pb_max: 2.5, self_percentile_max: 0.30}
        note: "周期股优先看PB"
      - id: dividend_yield
        rule: "当期股息率 ≥ 2倍10年期国债收益率"
        params: {yield_multiple_of_cn10y: 2.0}
  sell_triggers_valuation:   # 估值触发卖出（来源：§3.1）
    - id: yield_below_bond
      rule: "股息率跌破10年国债收益率 → 分批减持，2个月内清仓"
    - id: percentile_high
      rule: "PE/PB回升至历史70%分位以上 → 减持50%，观察1个月"
      params: {percentile_trigger: 0.70, reduce_ratio: 0.50, observe_period: "1个月"}
  replace_rule:   # 替换卖出（每季度最多换1只）
    rule: "发现更优标的：股息率高30%以上 + 估值更低 + 同等财务质量"
    frequency_cap: "每季度最多换1只"
    source: "§3.1"

# -----------------------------------------------------------------------------
# 择时组合估值规则（来源：§2.4 / §3.2）
# -----------------------------------------------------------------------------
timing_portfolio:
  buy_gate_valuation:   # 门槛条件中的估值项（至少满足1条）
    threshold: 1
    items:
      - {id: pe,    rule: "PE分位≤历史30% 且 PE≤30", params: {pe_percentile_max: 0.30, pe_max: 30}}
      - {id: pb,    rule: "PB≤2.5",                params: {pb_max: 2.5}}
      - {id: yield, rule: "股息率≥4%",              params: {yield_min: 0.04}}
  position_gate:
    rule: "较1年内高点回撤≥25%"
    params: {drawdown_from_52w_high_min: 0.25}
  sell_triggers_valuation:   # 来源：§3.2止盈
    - id: pe_percentile_70
      rule: "PE升至历史70%分位 → 再减持1/3（与盈利40%档并列触发）"
      params: {percentile_trigger: 0.70}

# -----------------------------------------------------------------------------
# 价格区间分级定义
# 说明：源文档无显式"价格区间分级"术语；按估值锚+安全边际原意做工程化映射，
#       仅用于报告展示分级，不构成新的买卖规则。
# -----------------------------------------------------------------------------
price_zone_definition:
  basis: "以研究笔记中的'目标买入价区间'与估值买入标准为锚"
  zones:
    - {zone: "买入区",  definition: "满足对应组合估值买入标准（§2.2满足≥1条 / §2.4门槛估值项满足≥1条）且价格落在研究笔记目标买入价区间内"}
    - {zone: "持有区",  definition: "不满足买入标准，且未触发任何估值卖出条件"}
    - {zone: "减持区",  definition: "触发估值卖出条件（股息：股息率<10年国债 或 PE/PB>历史70%分位；择时：PE>历史70%分位）"}
  note: "分级仅为报告可读性服务；执行以 risk_control.yaml 的止盈止损规则为准"

# -----------------------------------------------------------------------------
# 分行业估值模型
# -----------------------------------------------------------------------------
industry_models:
  status: "【待确认】源文档未定义分行业估值模型参数"
  available_industry_dimension: "股息组合按A金融/B周期/C稳定三类定义了财务门槛（见stock_selection.yaml），但未定义各类的合理估值区间与安全边际参数"
  interim_rule: >
    程序对所有行业统一使用上述相对估值规则（PE/PB历史分位+股息率锚）；
    个股合理价格区间按以下方式测算并在报告中标注口径：
    ① 若备选池研究笔记已定义估值锚 → 直接采用研究笔记区间；
    ② 若无研究笔记 → 以"自身历史30%分位PE(或PB)×当期业绩"为买入参考价上沿，
       以"历史70%分位"为减持参考价，并在报告显著位置标注【估值锚缺失，
       区间为体系默认口径推算，需补研究笔记】。
  prohibition: "禁止程序自行引入DCF、PEG目标倍数等源文档不存在的估值方法作为结论依据"

pending_confirmation:
  - id: 1
    item: "分行业估值模型的合理区间与安全边际参数"
    original_text: "全文无各行业合理PE/PB区间、安全边际比例的量化定义；附录A将估值锚交由逐票研究笔记定义"
    interim_rule: "见上方 industry_models.interim_rule"
  - id: 2
    item: "'行业均值PE'的行业分类口径"
    original_text: "§2.2'PE≤行业均值'未指明申万/中信/证监会行业分类"
    interim_rule: "程序默认采用东方财富行业板块均值（akshare可得），报告中标注口径"
