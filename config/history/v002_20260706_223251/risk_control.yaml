# =============================================================================
# risk_control.yaml — 仓位与风控规则（铁则层）
# 来源：《花茶个人投资体系 v4.1》§1.2 / §1.4 / §1.5 / §3.1-3.6 / §4.1
# 说明：源文档采用A/B/C市场状态区框架（非"牛/熊/震荡市"表述），
#       总仓位管理按市场状态区映射执行，此为源文档原意，未做转换。
# =============================================================================

meta:
  version: "4.1.0"
  source_document: "花茶个人投资体系v4.1.md"
  structured_date: "2026-07-06"

# -----------------------------------------------------------------------------
# 总仓位管理：市场状态 → 仓位上限映射（来源：§1.4）
# -----------------------------------------------------------------------------
position_by_market_state:
  A_undervalued:  {dividend_cap: 1.00, timing_cap: 1.00}
  B_low:          {dividend_cap: 0.80, timing_cap: 0.70}
  B_neutral:      {dividend_cap: 0.70, timing_cap: 0.50}
  B_high:         {dividend_cap: 0.60, timing_cap: 0.40, dividend_note: "暂停买入", timing_note: "不开新仓"}
  C_overvalued:
    dividend_cap: null   # 【待确认】原文为"考虑减持高估标的"，非量化，见 pending_confirmation[1]
    dividend_note: "考虑减持高估标的"
    timing_cap: 0.20
    timing_note: "只卖不买，降至20%以下"
  source: "v4.1 §1.4"

# 择时组合严格风控模式（来源：§1.5）
timing_strict_mode:
  trigger_any:
    - "账户年度累计盈利 > 15%"
    - "市场进入C区"
    - "沪深300波动率（VIX类指标）> 35%"   # 【待确认】数据源见 pending_confirmation[2]
  effects:
    position_cap: 0.30
    single_stock_cap: 0.15
    new_position: false
  source: "v4.1 §1.5"

# -----------------------------------------------------------------------------
# 单票与单行业仓位上限（来源：§1.2 / §2.1 / §2.5）
# -----------------------------------------------------------------------------
position_caps:
  dividend: {single_stock: 0.15, single_industry: 0.30, holdings: [5, 10]}
  timing:   {single_stock: 0.25, single_industry: 0.40, holdings_max: 8, cash_reserve_non_A: 0.10}
  satellite_circle_modifier: 0.50    # 卫星能力圈标的仓位减半（§2.1）
  etf: {single_etf: 0.15, total_etf: 0.30}   # 占择时组合（§2.5）
  source: "v4.1 §1.2 / §2.1 / §2.5"

# -----------------------------------------------------------------------------
# 建仓规则（来源：§3.1 / §3.2）
# -----------------------------------------------------------------------------
entry_rules:
  dividend:   # 分3批，间隔≥2周
    batch_interval_min: "2周"
    batches:
      - {batch: 1, ratio: 0.30, condition: "满足选股+估值标准"}
      - {batch: 2, ratio: 0.30, condition: "第1批后股价未涨超10%，或下跌≥5%"}
      - {batch: 3, ratio: 0.40, condition: "股价较第1批成本持平或更低"}
    post_entry: "核心持有≥1年；分红再投入组合内股息率最高且估值最低的标的；持有≥1年免征红利税"
  timing:     # 分3批
    batches:
      - {batch: 1, ratio: 0.30, condition: "满足门槛 + 评分≥3 + 24小时冷静期"}
      - {batch: 2, ratio: 0.30, condition: "下跌≥5%，或横盘≥2周后放量突破"}
      - {batch: 3, ratio: 0.40, condition: "下跌≥8%，且基本面逻辑未变"}
    cooling_period: "决策卡片定稿后24小时冷静期，次日收盘后确认仍想买入才可执行首仓"
  source: "v4.1 §3.1 / §3.2 / §2.6"

# -----------------------------------------------------------------------------
# 止盈规则（来源：§3.1 / §3.2）
# -----------------------------------------------------------------------------
take_profit:
  dividend:   # 估值触发（详见 valuation_model.yaml）
    - {trigger: "股息率跌破10年国债收益率", action: "分批减持，2个月内清仓"}
    - {trigger: "PE/PB回升至历史70%分位以上", action: "减持50%，观察1个月"}
  timing:     # 分档执行
    - {trigger: "盈利达20%或达目标价",            action: "减持1/3，剩余用移动止盈"}
    - {trigger: "盈利达40%或PE升至历史70%分位",    action: "再减1/3"}
    - {trigger: "卖出信号（技术指标+放量滞涨）",    action: "清仓剩余"}
    - {trigger: "自高点回落≥8%",                 action: "无条件清仓"}
  source: "v4.1 §3.1 / §3.2"

# -----------------------------------------------------------------------------
# 止损规则（来源：§3.1 / §3.2）
# -----------------------------------------------------------------------------
stop_loss:
  dividend_forced_sell:   # 强制卖出（任一触发→1个月内清仓）
    - "连续2年ROE < 8%"
    - "分红中断，或派现比例连续2年 < 25%"
    - "行业需求长期下滑（增速连续2年 < 1%）"
    - "公司竞争优势明确丧失"
    - "财务造假、重大违规"
  timing_hard:   # 硬性止损
    - {trigger: "亏损达成本的-10%",   action: "减仓50%"}
    - {trigger: "亏损达成本的-15%",   action: "清仓（无条件）"}
    - {trigger: "买入逻辑被证伪",     action: "立即清仓，不看价格"}
    - {trigger: "突发黑天鹅",        action: "复牌首日评估，原则上清仓"}
  timing_time_based:   # 时间止损
    - {trigger: "3个月内既未盈利也未止损", action: "减仓50%"}
    - {trigger: "6个月仍无起色",          action: "清仓"}
    - {trigger: "持有满12个月",           action: "必须重新评估，有新买入理由则继续，否则退出"}
  source: "v4.1 §3.1 / §3.2"

# -----------------------------------------------------------------------------
# 通用硬性约束（两组合共用，来源：§3.3）
# -----------------------------------------------------------------------------
universal_constraints:
  source: "v4.1 §3.3"
  rules:
    - {id: no_avg_up,        rule: "股价高于持仓均价时禁止加仓",                       defends: "越涨越买"}
    - {id: op_interval,      rule: "同一标的两次操作间隔≥5个交易日（股息组合≥2周）",     defends: "频繁交易"}
    - {id: daily_limit,      rule: "每天最多建仓1只新标的",                           defends: "冲动决策"}
    - {id: frequency_cap,    rule: "择时每周最多2笔交易，股息每月最多1笔",              defends: "过度交易"}
    - {id: info_sources,     rule: "任何建仓/清仓决策需≥2个独立信息源",                defends: "单一信息依赖"}
    - {id: emotion_filter,   rule: "情绪评分1分或5分时，不执行非预案操作",              defends: "恐惧/贪婪劫持"}
    - {id: no_leverage,      rule: "配资、消费贷入市一律禁止",                        defends: "杠杆风险"}

# -----------------------------------------------------------------------------
# 情绪防御机制（来源：§3.4）
# -----------------------------------------------------------------------------
emotion_defense:
  cooling_period:
    scope: "任何非预案内的临时操作"
    rule: "记录想法 → 等24小时 → 次日收盘后决定"
    exception: "触发硬性止损线立即执行"
  circuit_breaker:
    rule: "连续3笔交易亏损 → 强制暂停开新仓2周，只持有或减仓"
  emotion_tracking:
    rule: "每次交易记录情绪分(1-5)；月度统计极端情绪交易亏损率；若>60% → 下月冷静期升级为48小时"
  source: "v4.1 §3.4"

# -----------------------------------------------------------------------------
# 异常预案（来源：§3.5）
# -----------------------------------------------------------------------------
contingency_plans:
  source: "v4.1 §3.5"
  rules:
    - {scenario: "单日账户亏损>5%",      rule: "当日不做任何操作，次日收盘后评估"}
    - {scenario: "大盘单日跌幅>5%",      rule: "不恐慌卖出；A区视为加仓机会"}
    - {scenario: "持仓股停牌",           rule: "不调整其他仓位'补偿'，等复牌评估"}
    - {scenario: "政策突然利空",         rule: "评估是否影响持仓逻辑，是→逻辑止损，否→不动"}
    - {scenario: "持仓股发布重大公告",    rule: "公告日不操作，24小时消化后对照决策卡片判断"}
    - {scenario: "账户出现重大盈利",      rule: "不加仓、不扩能力圈，按原计划执行"}
    - {scenario: "账户出现重大亏损",      rule: "不摊薄、不换股、不借钱，启动冷静期"}

# 空仓期管理（择时组合专用，来源：§3.6）
idle_cash_management:
  destination: "国债逆回购或货币基金"
  behavior: "维护备选池、更新研究笔记、阅读研报，但不操作"
  principle: "空仓是一种仓位决策，不是'什么都没做'；记录'想买但忍住了'的标的供事后复盘"
  source: "v4.1 §3.6"

# -----------------------------------------------------------------------------
# 风险预警分类（供 market_analyzer / stock_analyzer 输出报告使用）
# 分级依据：体系内规则的强制程度，非新增规则
# -----------------------------------------------------------------------------
risk_alert_levels:
  P0_hard_rule:   "触发硬性止损/强制卖出/红线（如-15%清仓、财务造假、防火墙违规）→ 报告置顶红色预警"
  P1_valuation:   "触发估值卖出条件或市场状态降档（如进入C区、PE>70%分位）→ 报告显著黄色预警"
  P2_watch:       "接近阈值但未触发（如亏损-8%接近-10%减仓线、质押率25%接近30%）→ 报告观察项"
  P3_info:        "一般性风险提示（行业新闻、待验证信号）→ 报告信息项"

# 检查频率日历（来源：§4.1，供报告生成与迭代模块引用）
review_calendar:
  source: "v4.1 §4.1 / §3.1再平衡"
  items:
    - {item: "择时持仓检查",     frequency: "每日收盘后",     duration: "<5分钟",  content: "看日线，趋势在就不动（盘中不看）"}
    - {item: "市场状态更新",     frequency: "每周日",        duration: "15分钟",  content: "更新ABC区判断"}
    - {item: "股息持仓检查",     frequency: "每周一次",      duration: "10分钟",  content: "看周线，有无异常"}
    - {item: "股息标的基本面",   frequency: "每月一次",      duration: "30分钟",  content: "财务数据、分红公告"}
    - {item: "月度复盘",        frequency: "每月最后交易日",  duration: "30分钟",  content: "5个复盘问题"}
    - {item: "备选池维护",      frequency: "每季度一次",     duration: "2小时",   content: "增删标的、更新研究笔记"}
    - {item: "季度复盘",        frequency: "每季度末",       duration: "1-2小时", content: "收益/回撤/胜率/象限归因"}
    - {item: "股息组合再平衡",   frequency: "6月/12月底",    duration: "30分钟",  content: "单票>15%减持，<5%考虑加仓或清退；涨幅>20%立即减至15%"}
    - {item: "战略配置检视",     frequency: "每半年",        duration: "1小时",   content: "第一层参数是否需要调整"}
    - {item: "年度复盘",        frequency: "12月",          duration: "半天",    content: "对标沪深300/纪律统计/能力圈复核/体系迭代"}

# 体系迭代约束（供 system_iter.py 强制遵守，来源：§4.3）
iteration_constraints:
  rules:
    - "参数调整基于≥6个月数据回顾，不因单次交易修改"
    - "每次修改记录：修改原因、前后参数、生效日期"
    - "同一参数一年内最多修改2次"
    - "重大迭代需月度复盘中提出，冷静一个月后执行"
    - "修订必须在非交易时段、非情绪化状态下进行"
    - "所有迭代决策写入《体系演化日志》"
    - "年度复盘：每年最多修改2-3条规则"
  protected_principles:   # 默认不主动建议修改的底层原则
    - "核心理念（安全边际优先，纪律执行为王）"
    - "两组合防火墙规则"
    - "我不赚的钱（四类拒绝清单）"
    - "绝不借钱（禁杠杆）"
    - "风险偏好参数（最大回撤容忍度）"
  source: "v4.1 §4.3 / 阶段四迭代安全机制要求"

pending_confirmation:
  - id: 1
    item: "C区股息组合仓位上限"
    original_text: "§1.4 C区股息组合为'考虑减持高估标的'，无量化上限"
    interim_rule: "程序不给出量化上限，仅提示逐票检查估值卖出条件（valuation_model.yaml sell_triggers）"
  - id: 2
    item: "沪深300波动率(VIX类)>35%的数据源"
    original_text: "§1.5 严格风控触发条件③"
    interim_rule: "程序以沪深300近20日年化历史波动率近似计算并标注口径；如用户有指定的中国波指数据源请确认"
  - id: 3
    item: "'卖出信号（技术指标+放量滞涨）'的量化定义"
    original_text: "§3.2 止盈第三档"
    interim_rule: "程序仅提示该档为人工判断项，不自动触发"
