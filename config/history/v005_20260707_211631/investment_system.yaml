      note: "股息组合选股标准按行业分类重构（金融/周期/稳定）；择时备选池放宽净利润条件；新增ETF买入规则"
    - version: "4.1.0"
      date: "2026-07-06"
      note: "结构化为YAML配置（本文件），内容与v4.1原文一致，无新增规则"

# -----------------------------------------------------------------------------
# 投资者画像与核心理念（来源：写在前面）
# -----------------------------------------------------------------------------
investor_profile:
  type: "偏结构性思维的个人投资者"
  capital_scale: "300万以下"
  strengths: ["行业趋势判断", "企业基本面判断", "愿意持有、能扛回撤"]
  fatal_weakness: "仓位管理无纪律（历史三次大亏：重庆啤酒、招商轮船、中际旭创）"
  mission: "让正确的判断兑现为正确的结果，让错误的判断被及时纠正而不致命"
  source: "v4.1 写在前面"

philosophy:
  core: "安全边际优先，纪律执行为王，认知复利驱动进化"
  architecture_principles:
    - "四层递进：战略配置→研究选择→交易执行→复盘进化"
    - "上约束下：上层决定下层边界，下层不反向干扰上层"
    - "两组合独立：股息组合与择时组合物理隔离，互不干扰"
    - "规则嵌入防御：人性弱点防御靠嵌入操作环节的硬性约束，不靠意志力"
  money_we_earn:
    dividend_portfolio: "企业现金流分配的钱：持续分红+低估值买入+长期持有，赚股息+估值修复双驱动复利"
    timing_portfolio: "企业阶段性增长或估值回归的钱：成长线（龙头盈利增长）+修复线（低估值回归），持有周期1-6个月为主"
  money_we_refuse:  # 红线，任何分析不得建议以下行为
    - "短期博弈、追涨杀跌、纯技术面炒作"
    - "内幕消息、朋友推荐、小道消息"
    - "看不懂的行业和商业模式"
    - "情绪亢奋时追高"
  source: "v4.1 写在前面 / 收益来源信念 / 我不赚的钱"

# -----------------------------------------------------------------------------
# 两组合框架与核心指标（来源：§1.1 / §1.2）
# -----------------------------------------------------------------------------
portfolios:
  dividend:   # 股息组合
    capital_ratio: 0.50
    account: "独立券商账户A"
    market: "A股"
    style: "长期持有，收息复利"
    holding_period: "≥1年"
    annual_return_target: [0.08, 0.12]
    max_drawdown_tolerance: 0.15
    holdings_count: [5, 10]
    single_stock_cap: 0.15
    single_industry_cap: 0.30
    min_cash_reserve: null   # 无硬性要求
  timing:     # 择时组合
    capital_ratio: 0.50
    account: "独立券商账户B"
    market: "A股"
    style: "中期波段，催化/轮动驱动"
    holding_period: "1-6个月，最长12个月"
    annual_return_target: 0.20
    max_drawdown_tolerance: 0.20
    holdings_count_max: 8
    single_stock_cap: 0.25
    single_industry_cap: 0.40
    min_cash_reserve: "非A区时≥10%"
  firewall_rules:  # 防火墙规则（硬性，无例外）
    - "两账户资金不互相调拨，任何理由都不行"
    - "分开记录、分开复盘、分开计算收益"
    - "股息组合的分红仅在本组合内再投资"
    - "择时组合的盈利仅在本组合内使用"
    - "一个组合的亏损不影响另一个组合的操作节奏"
  source: "v4.1 §1.1 / §1.2"

# -----------------------------------------------------------------------------
# 能力圈声明（来源：§2.1）
# -----------------------------------------------------------------------------
capability_circle:
  core:        # 核心能力圈：可重仓，单票可到对应组合上限
    industries: ["新能源车", "保险", "储能", "消费电子"]
    constraint: "单票可到对应组合上限"
  satellite:   # 卫星能力圈：可参与，仓位减半
    industries: ["AI应用层", "医疗器械", "银行", "煤炭", "运营商"]
    constraint: "仓位减半约束"
  excluded:    # 能力圈外：禁止建仓
    industries: ["创新药", "农业", "军工", "看不懂的行业"]
    constraint: "禁止建仓"
  hard_exclusions:  # 完全排除（红线）
    - "ST股"
    - "退市风险股"
    - "纯概念股"
    - "财务数据有疑点的公司"
    - "大股东频繁减持/质押比例过高"
    - "审计意见异常"
    - "重大诉讼未决"
  adjustment_rule: "能力圈每年度复盘时可调整，必须基于新增的系统性研究，不基于近期盈亏"
  source: "v4.1 §2.1"

# -----------------------------------------------------------------------------
# 市场状态判断框架（来源：§1.3，两组合共用）
# v4.2.0 自动化口径（用户2026-07-06裁决）：
#   - 程序初判（judge-state）基于下方 automated 标注的量化条件；
#   - 政策/情绪类定性条件（automated: false）不参与程序判定，仅作人工参考；
#   - A区/C区判定门槛：可判定条件中满足≥3条（C区原文未标门槛，确认参照A区）；
#   - B区细分按股债利差带；股债利差 = 1/中证全指PE(中证官网市盈率1) - 10年国债收益率
#     （中证全指为"Wind全A非金融石化"的可编程替代口径，已知偏差：含金融石化，判定时标注）
# -----------------------------------------------------------------------------
market_state_framework:
  update_frequency: "每周日晚更新，记录在案，一周内不改判；程序初判可随时运行，落盘判定以周判为准"
  auto_judgment:
    enabled: true
    equity_bond_spread_formula: "1/中证全指PE - CN10Y"
    pe_source: "中证指数官网(000985中证全指) 市盈率1"
    turnover_history: "由每日运行累积（data/processed/turnover_history.json），样本<10日时如实标注"
    override: "人工 set-state 优先于程序初判"
  states:
    A_undervalued:
      name: "A区·低估"
      rule: "可判定条件中满足≥3条进入该区"
      conditions:
        - id: "sh_index_low"
          desc: "上证跌破3000点，或市净率历史5%分位以下"
          automated: true
        - id: "wind_a_pe"
          desc: "Wind全A非金融石化PE < 22倍"
          automated: true
          auto_proxy: "中证全指PE(市盈率1) < 22（替代口径，含金融石化，偏保守）"
        - id: "equity_bond_spread_high"
          desc: "股债利差 > 5%"
          automated: true
        - id: "below_book_ratio"
          desc: "全市场破净率 > 10%"
          automated: false
          note: "无可编程公开数据源（2026-07核实），不参与自动判定"
        - id: "low_turnover"
          desc: "日成交额连续10日 < 7000亿 且换手率 < 1.5%"
          automated: true
          auto_proxy: "以自建成交额历史序列判定，样本<10日时按已有样本判定并标注"
        - id: "policy_support"
          desc: "官方明确'提振资本市场'表述"
          automated: false
          note: "定性条件，仅人工参考（v4.2.0裁决#3）"
    B_low:
      name: "B偏低"
      conditions_desc: "股债利差4.5%-5%，成交额偏低，情绪偏冷"
      equity_bond_spread: [0.045, 0.05]
    B_neutral:
      name: "B中性"
      conditions_desc: "股债利差3.5%-4.5%，成交额正常"
      equity_bond_spread: [0.035, 0.045]
    B_high:
      name: "B偏高"
      conditions_desc: "股债利差3%-3.5%，成交额偏高，情绪偏热"
      equity_bond_spread: [0.03, 0.035]
    C_overvalued:
      name: "C区·高估"
      rule: "可判定条件中满足≥3条进入该区"   # v4.2.0裁决#1：确认参照A区按≥3条
      conditions:
        - id: "sh_index_high"
          desc: "上证逼近或突破历史高点"
          automated: true
          auto_proxy: "上证收盘价 ≥ 历史最高收盘×95%"
        - id: "extreme_greed"
          desc: "恐惧贪婪指数极度贪婪，日成交持续 > 1.5万亿"
          automated: true
          auto_proxy: "日成交额连续5日 > 1.5万亿（v4.2.0裁决#2：A股无可编程恐惧贪婪指数，取原文并列描述的可测部分）"
        - id: "new_accounts_high"
          desc: "新股民开户数同比历史高位"
          automated: false
          note: "无可编程公开数据源，不参与自动判定"
        - id: "hot_fund_launch"
          desc: "偏股基金出现日光基"
          automated: false
          note: "定性条件，仅人工参考"
        - id: "policy_warning"
          desc: "官方提示金融市场风险"
          automated: false
          note: "定性条件，仅人工参考（v4.2.0裁决#3）"
        - id: "equity_bond_spread_low"
          desc: "股债利差 < 2%"
          automated: true
  source: "v4.1 §1.3；自动化口径为v4.2.0用户裁决"

# -----------------------------------------------------------------------------
# 四层研究框架（来源：附录D / 各层引言）
# -----------------------------------------------------------------------------
research_framework:
  layers:
    - name: "第一层 战略配置"
      question: "钱怎么分？市场在哪个区？"
      frequency: "每半年检视一次，或重大环境变化触发"
      constraint: "日常操作不碰这一层"
    - name: "第二层 研究选择"
      question: "买什么？为什么买？"
      frequency: "持续进行，只在有明确机会时输出决策卡片"
      constraint: "任何标的从想买到真买必须经过决策卡片，没有定稿卡片不准买入"
    - name: "第三层 交易执行"
      question: "什么时候动手？怎么止盈止损？"
      frequency: "由决策卡片和预设规则触发"
      constraint: "所有操作必须是预设规则触发的主动行为，不是情绪驱动的被动反应"
    - name: "第四层 复盘进化"
      question: "哪里做对了？哪里做错了？体系怎么改？"
      frequency: "按检查频率日历执行（见 risk_control.yaml review_calendar）"
      constraint: "现阶段守住纪律的优先级高于追求判断完美"
  core_constraint: "上层决定下层边界，下层不反过来干扰上层"
  source: "v4.1 附录D / 第一~四层引言"

# -----------------------------------------------------------------------------
# 已裁决口径（原 pending_confirmation，2026-07-06 用户授权全部裁决固化）
# -----------------------------------------------------------------------------
confirmed_decisions:
  - id: 1
    item: "C区判定门槛"
    decision: "确认：参照A区，可判定条件满足≥3条进入C区"
    decided: "2026-07-06"
  - id: 2
    item: "恐惧贪婪指数数据源"
    decision: "A股无稳定可编程恐惧贪婪指数；C区条件②量化替代为'日成交额连续5日>1.5万亿'（原文并列描述的可测部分）"
    decided: "2026-07-06"
  - id: 3
    item: "政策表述类条件"
    decision: "移出程序自动判定（automated: false），仅作每周人工复核参考；自动判定基于量化条件子集，门槛不变"
    decided: "2026-07-06"
