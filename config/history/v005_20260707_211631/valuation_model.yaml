# =============================================================================
# valuation_model.yaml — 估值模型（铁则层）
# 来源：《花茶个人投资体系 v4.1》§2.2估值买入标准 / §2.4门槛条件 / §3.1-3.2卖出触发 / 附录A估值锚
# 重要说明：源文档未定义分行业的DCF/目标估值参数体系（如各行业合理PE区间、
#           安全边际折扣率）。个股的"估值锚"由研究笔记逐票定义（附录A）。
#           本文件只结构化源文档实际存在的估值规则，绝不编造参数。
# =============================================================================

meta:
  version: "4.3.0"
  source_document: "花茶个人投资体系v4.1.md"
  structured_date: "2026-07-06"
  changelog_4_2_0: "2026-07-06用户裁决：#8统一相对估值口径转正式规则；#9行业均值PE改用巨潮证监会行业口径（与公司概况行业字段同源）；分位数据源固化三级链"
  changelog_4_3_0: >
    2026-07-07用户授权任务二：industry_models 升级为分行业多锚点估值体系——
    四类行业（金融/周期/稳定/成长）各配3-4种估值方法，核心锚/辅助锚/验证锚三层加权；
    方法间偏差>30%不强行加权并标注原因；新增安全边际系数0.90（工程参数）。
    全部方法参数锚定体系既有规则（历史30/50/70分位、股息率2×国债买入锚与1×国债卖出锚、
    PE≤30上限、行业均值PE口径），无体系外新增买卖规则；原§2.2/§2.4买卖门槛判定不变。
    v4.2.0'禁止引入PEG等方法'条款同步废止（仅限估值区间测算展示用途，不改变门槛判定）。

# -----------------------------------------------------------------------------
# 通用估值原则
# -----------------------------------------------------------------------------
general_principles:
  percentile_window_default: "近10年"   # v4.2.0裁决#4固化：近10年；数据源三级链见 industry_models.percentile_data_chain
  principles:
    - "安全边际优先：估值标准是买入的前置门槛，不满足估值标准不买（§2.2/§2.4）"
    - "相对估值为主：体系采用PE/PB历史分位+股息率锚，而非绝对估值模型"
    - "周期股优先看PB（§2.2）"
    - "个股估值锚（合理PE/PB区间、目标买入价区间）由备选池研究笔记逐票定义（附录A），程序读取研究笔记，无笔记则标注缺失"

# -----------------------------------------------------------------------------
# 股息组合估值规则（来源：§2.2 / §3.1）
# -----------------------------------------------------------------------------
dividend_portfolio:
  buy_criteria:   # 满足≥1条即达到估值买入标准
    threshold: 1
    items:
      - id: pe
        rule: "PE ≤ 行业均值 且 PE处于自身历史30%分位以下"
        params: {industry_pe_op: "<=", self_percentile_max: 0.30}
      - id: pb
        rule: "PB ≤ 2.5 且 PB处于自身历史30%分位以下"
        params: {pb_max: 2.5, self_percentile_max: 0.30}
        note: "周期股优先看PB"
      - id: dividend_yield
        rule: "当期股息率 ≥ 2倍10年期国债收益率"
        params: {yield_multiple_of_cn10y: 2.0}
  sell_triggers_valuation:   # 估值触发卖出（来源：§3.1）
    - id: yield_below_bond
      rule: "股息率跌破10年国债收益率 → 分批减持，2个月内清仓"
    - id: percentile_high
      rule: "PE/PB回升至历史70%分位以上 → 减持50%，观察1个月"
      params: {percentile_trigger: 0.70, reduce_ratio: 0.50, observe_period: "1个月"}
  replace_rule:   # 替换卖出（每季度最多换1只）
    rule: "发现更优标的：股息率高30%以上 + 估值更低 + 同等财务质量"
    frequency_cap: "每季度最多换1只"
    source: "§3.1"

# -----------------------------------------------------------------------------
# 择时组合估值规则（来源：§2.4 / §3.2）
# -----------------------------------------------------------------------------
timing_portfolio:
  buy_gate_valuation:   # 门槛条件中的估值项（至少满足1条）
    threshold: 1
    items:
      - {id: pe,    rule: "PE分位≤历史30% 且 PE≤30", params: {pe_percentile_max: 0.30, pe_max: 30}}
      - {id: pb,    rule: "PB≤2.5",                params: {pb_max: 2.5}}
      - {id: yield, rule: "股息率≥4%",              params: {yield_min: 0.04}}
  position_gate:
    rule: "较1年内高点回撤≥25%"
    params: {drawdown_from_52w_high_min: 0.25}
  sell_triggers_valuation:   # 来源：§3.2止盈
    - id: pe_percentile_70
      rule: "PE升至历史70%分位 → 再减持1/3（与盈利40%档并列触发）"
      params: {percentile_trigger: 0.70}

# -----------------------------------------------------------------------------
# 价格区间分级定义
# 说明：源文档无显式"价格区间分级"术语；按估值锚+安全边际原意做工程化映射，
#       仅用于报告展示分级，不构成新的买卖规则。
# -----------------------------------------------------------------------------
price_zone_definition:
  basis: "以研究笔记中的'目标买入价区间'与估值买入标准为锚"
  zones:
    - {zone: "买入区",  definition: "满足对应组合估值买入标准（§2.2满足≥1条 / §2.4门槛估值项满足≥1条）且价格落在研究笔记目标买入价区间内"}
    - {zone: "持有区",  definition: "不满足买入标准，且未触发任何估值卖出条件"}
    - {zone: "减持区",  definition: "触发估值卖出条件（股息：股息率<10年国债 或 PE/PB>历史70%分位；择时：PE>历史70%分位）"}
  note: "分级仅为报告可读性服务；执行以 risk_control.yaml 的止盈止损规则为准"

# -----------------------------------------------------------------------------
# 分行业多锚点估值模型（v4.3.0，2026-07-07用户授权任务二）
# 定位：仅用于测算"合理价格区间/安全边际价/高估阈值"供报告展示与研究笔记参考；
#       §2.2/§2.4 的买卖门槛判定口径不变，本模型不新增任何买卖规则。
# 结构：每类行业 = 核心锚(权重最高) + 辅助锚 + 验证锚，可用方法权重归一化加权；
#       方法输入缺失 → 该方法标注不可用；可用<2种 → 不输出综合区间。
# -----------------------------------------------------------------------------
industry_models:
  status: "正式规则（v4.3.0多锚体系，v4.2.0统一口径升级版）"
  percentile_data_chain: "分位数据源三级链（裁决#4）：乐咕全历史 → 新浪价格+年报EPS/BPS自算（近10年，阶梯近似）→ 百度约2年序列（末级兜底，必须标注窗口）"
  industry_avg_pe_source: "巨潮资讯·证监会行业分类·静态市盈率-加权平均（裁决#9）"
  divergence_threshold: 0.30    # 方法区间中值极差/均值 > 30% → 不强行加权，分别列示并说明
  safety_margin_coef: 0.90      # 安全边际价 = 综合区间下沿 × 0.90（工程参数，v4.3.0授权）
  research_note_priority: "备选池研究笔记已定义估值锚的标的，以研究笔记区间优先，本模型结果作交叉验证"
  excluded_methods:
    - "EV/EBITDA：EBITDA无稳定公开数据接口，纳入会引入编造风险，暂不启用"
    - "完整DCF：自由现金流预测假设过多，与'相对估值为主'的体系原则冲突，以股息率锚法作为绝对估值的简化替代"
    - "PS：无历史PS序列数据源，仅作展示性补充口径，不参与加权"

  classes:
    A_financial:
      name: "金融（银行/保险/证券）"
      rationale: "金融业利润受拨备与准备金调节，PB与股息是更稳定的锚；PE仅作同业交叉验证"
      methods:
        - {id: pb_quantile,     layer: "核心锚", weight: 0.50,
           scene: "重资产牌照行业，净资产是定价基础；周期底部PB分位失真小"}
        - {id: dividend_anchor, layer: "辅助锚", weight: 0.30,
           scene: "高分红行业，体系原生股息锚（买入≥2×国债/卖出<国债）直接适用"}
        - {id: industry_pe,     layer: "验证锚", weight: 0.20,
           scene: "同业横向对比，校验个股相对行业的溢价/折价是否合理"}
    B_cyclical:
      name: "周期资源（煤炭/石化/有色/钢铁）"
      rationale: "周期高点PE最低、低点PE最高（PE陷阱），体系明确'周期股优先看PB'（§2.2）"
      methods:
        - {id: pb_quantile,     layer: "核心锚", weight: 0.50,
           scene: "PB对周期位置不敏感，是周期股主锚（§2.2原文）"}
        - {id: dividend_anchor, layer: "辅助锚", weight: 0.30,
           scene: "资源股高分红特征，分红意愿连续性是B类门槛核心（§2.2）"}
        - {id: pe_quantile,     layer: "验证锚", weight: 0.20,
           scene: "仅作验证：PE分位低+PB分位低共振时置信度高；单独PE低可能是周期顶部陷阱"}
    C_stable:
      name: "稳定消费/公用事业/制造（消费/家电/水电/交运/运营商）"
      rationale: "盈利稳定行业PE有效性最高；现金流充沛支撑股息锚；PB作资产底验证"
      methods:
        - {id: pe_quantile,     layer: "核心锚", weight: 0.40,
           scene: "盈利波动小，历史PE分位回归有效性最高"}
        - {id: dividend_anchor, layer: "辅助锚", weight: 0.35,
           scene: "股息组合主战场，体系股息锚直接适用"}
        - {id: pb_quantile,     layer: "验证锚", weight: 0.25,
           scene: "净资产提供估值下限验证，防PE法在盈利下修期失真"}
    G_growth:
      name: "成长制造/科技（新能源车/消费电子/半导体/软件）"
      rationale: "成长股低分红使股息锚失效，DDM系统性低估；以PE分位为主、PEG校准成长溢价"
      methods:
        - {id: pe_quantile,     layer: "核心锚", weight: 0.40,
           scene: "自身历史分位反映市场对其成长性的定价惯性"}
        - {id: peg,             layer: "辅助锚", weight: 0.35,
           scene: "用一致预测CAGR校准合理PE（PEG 0.8-1.0，减持1.2），受体系PE≤30上限约束（§2.4）"}
        - {id: pb_quantile,     layer: "验证锚", weight: 0.25,
           scene: "重资产成长（如整车/电池）净资产可验证下限；轻资产标的该锚偏宽松需注意"}
    class_mapping_note: >
      A/B类沿用选股门槛的行业归类；原C类兜底按行业关键词再分"稳定/成长"两套方法集
      （成长关键词：汽车/电子/软件/半导体/电池/通信设备等，见 multi_valuation.GROWTH_KEYWORDS）；
      归类为工程辅助口径，报告中标注，研究笔记可逐票覆盖。

confirmed_decisions:   # 原 pending_confirmation，2026-07-06 裁决固化
  - id: 8
    item: "分行业估值模型参数"
    decision: "确认统一相对估值口径为正式规则；估值锚仍由逐票研究笔记定义。（2026-07-07任务二升级为四类行业多锚体系，研究笔记优先级不变）"
    decided: "2026-07-06"
  - id: 9
    item: "行业均值PE口径"
    decision: "巨潮证监会行业分类·静态市盈率-加权平均（原东财板块口径因接口不稳弃用）"
    decided: "2026-07-06"
  - id: 13
    item: "多锚估值体系（任务二）"
    decision: "四类行业各配≥3种方法三层加权；偏差>30%不加权分别列示；安全边际系数0.90；仅用于区间测算展示，不改变§2.2/§2.4门槛判定"
    decided: "2026-07-07"
